apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      # k8s 서비스 디스커버리 env var 주입 방지
      enableServiceLinks: false
      # GPU 워커 노드에만 스케줄
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: download-model
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              MODEL_PATH="/models/{{ .Values.model.file }}"
              if [ -f "$MODEL_PATH" ]; then
                echo "Model already exists, skipping download."
                exit 0
              fi
              pip install -q huggingface_hub && \
              hf download {{ .Values.model.repo }} {{ .Values.model.file }} \
                --local-dir /models
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: model-cache
              mountPath: /models
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
      containers:
        - name: vllm
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          args:
            - "--model"
            - "/models/{{ .Values.model.file }}"
            - "--n-gpu-layers"
            - "999"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "{{ .Values.port }}"
            - "--ctx-size"
            - "32768"
            - "--parallel"
            - "4"
            - "--flash-attn"
          ports:
            - containerPort: {{ .Values.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: model-cache
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: vllm-model-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
