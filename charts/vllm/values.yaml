model: "TurbulenceDeterministe/Carnice-9b-W8A16-AWQ"
gpuMemoryUtilization: "0.90"
port: 8000

image:
  repository: vllm/vllm-openai
  tag: latest

resources:
  limits:
    nvidia.com/gpu: "1"
  requests:
    nvidia.com/gpu: "1"

extraArgs:
  - "--reasoning-parser=qwen3"
  - "--language-model-only"
  - "--tensor-parallel-size=1"
  - "--enable-auto-tool-choice"
  - "--tool-call-parser=hermes"

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path
