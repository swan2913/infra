image:
  repository: nousresearch/hermes-agent
  tag: latest
  pullPolicy: Always

# vLLM 인클러스터 엔드포인트
vllm:
  baseUrl: "http://vllm.vllm.svc.cluster.local:8000/v1"
  model: "TurbulenceDeterministe/Carnice-9b-W8A16-AWQ"

# Discord 봇 설정 (토큰은 k8s Secret 'hermes-discord'에서 주입)
discord:
  allowedUsers: ""   # 쉼표 구분 Discord 사용자 ID
  ignoreMention: "false"  # DM에서는 mention 불필요

# 에이전트 데이터 영속 볼륨 (sessions, memory, skills)
persistence:
  enabled: true
  size: 10Gi
  storageClass: local-path

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "4Gi"
