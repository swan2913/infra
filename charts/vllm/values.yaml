model: "kai-os/Carnice-9b-GGUF"
gpuMemoryUtilization: "0.90"
port: 8000

image:
  repository: vllm/vllm-openai
  tag: latest

resources:
  limits:
    nvidia.com/gpu: "1"
  requests:
    nvidia.com/gpu: "1"

extraArgs:
  - "--gguf-file=Carnice-9b-Q4_K_M.gguf"
  - "--tokenizer=kai-os/Carnice-9b"
  - "--reasoning-parser=qwen3"
  - "--language-model-only"
  - "--tensor-parallel-size=1"
  - "--enable-auto-tool-choice"
  - "--tool-call-parser=hermes"

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path
