apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kai-scheduler
  namespace: kai-scheduler
spec:
  interval: 1h
  dependsOn:
    - name: gpu-operator
      namespace: gpu-operator
  chart:
    spec:
      chart: kai-scheduler
      sourceRef:
        kind: HelmRepository
        name: run-ai
        namespace: kai-scheduler
      interval: 12h
