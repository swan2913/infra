apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      initContainers:
        - name: init-config
          image: busybox
          command: ['sh', '-c', 'cp /etc/hermes-config/config.yaml /opt/data/config.yaml && echo "Config copied."']
          volumeMounts:
            - name: config-template
              mountPath: /etc/hermes-config
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["gateway", "run"]
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-discord
                  key: bot-token
            - name: DISCORD_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-discord
                  key: allowed-users
                  optional: true
            - name: DISCORD_IGNORE_NO_MENTION
              value: {{ .Values.discord.ignoreMention | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: hermes-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config-template
          configMap:
            name: hermes-config
