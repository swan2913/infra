apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    model:
      default: {{ .Values.vllm.model | quote }}
      provider: "custom"
      base_url: {{ .Values.vllm.baseUrl | quote }}
    custom_providers:
      - name: "vllm"
        base_url: {{ .Values.vllm.baseUrl | quote }}
